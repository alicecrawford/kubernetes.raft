---
global:
  domain: argocd.raft.lutris.house
  dualStack:
    ipFamilyPolicy: PreferDualStack

configs:
  params:
    server.insecure: true

  cm:
    oidc.config: |
      name: Authelia
      issuer: https://auth.raft.lutris.house
      clientID: EyxwBAztTO~trz08ewnQTypUBnk-KllPKhaTf7NygQ_n2mcb6lwrVESaKz01nDYjw1Dz043X
      clientSecret: $argocd-oidc-authelia:oidc.clientSecret
      requestedScopes: ['openid', 'offline_access']
      requestedIDTokenClaims:
        argocd_claim: { essential: true }
        email: { essential: false }
        name: { essential: false }
        preferred_username: { essential: false }
      enableUserInfoGroups: true
      userInfoPath: /api/oidc/userinfo
      userInfoCacheExpiration: '5m'
    exec.enabled: true
    statusbadge.enabled: true
    ssh:
      extraHosts: |
        git.raft.lutris.house ssh-rsa 

controller:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

dex:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

redis:
  exporter:
    enabled: true
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

server:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

applicationSet:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

notifications:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

repoServer:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
