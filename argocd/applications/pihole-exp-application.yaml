---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pihole-exp
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: pihole-exp
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
  sources:
    - repoURL: https://mojo2600.github.io/pihole-kubernetes/
      chart: pihole
      path: .
      targetRevision: 2.35.0
      helm:
        valuesObject:
          DNS1: 8.8.8.8
          DNS2: 1.1.1.1
          tolerations:
            - key: "node.kubernetes.io/unreachable"
              operator: "Exists"
              effect: "NoExecute"
              tolerationSeconds: 5
            - key: "node.kubernetes.io/not-ready"
              operator: "Exists"
              effect: "NoExecute"
              tolerationSeconds: 5
          persistentVolumeClaim:
            enabled: true
            storageClass: longhorn
            size: 10Gi
          dualStack:
            enabled: true
          admin:
            existingSecret: pihole-admin
          serviceDns:
            mixedService: true
            type: LoadBalancer
          serviceDhcp:
            enabled: false
          podDnsConfig:
            enabled: true
            policy: None
            nameservers:
              - 127.0.0.1
              - 8.8.8.8
          extraEnvVars:
            FTLCONF_dns_listeningMode: all
            DNSMASQ_USER: root
    - repoURL: https://git.raft.lutris.house/the_raft/kubernetes.raft
      path: pihole-exp
      targetRevision: HEAD
      ref: values
