---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cryptpad
spec:
  destination:
    namespace: cryptpad
    server: https://kubernetes.default.svc
  project: default
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
  sources:
    - path: cryptpad
      repoURL: https://git.raft.lutris.house/the_raft/kubernetes.raft
      targetRevision: HEAD
      ref: values
