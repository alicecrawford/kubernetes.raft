---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cryptpad
spec:
  destination:
    namespace: cryptpad
    server: https://kubernetes.default.svc
  project: system
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
  sources:
    - path: cryptpad
      repoURL: https://git.raft.lutris.house/the_raft/kubernetes.raft
      targetRevision: HEAD
      ref: values
    - repoURL: https://git.raft.lutris.house/api/packages/the_raft/helm/
      chart: gw-helper
      targetRevision: 0.1.3
      helm:
        valueFiles:
          - $values/cryptpad/values/values-gateway.yaml
