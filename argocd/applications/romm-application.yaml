---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: romm
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: romm
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
  sources:
    - repoURL: https://valkey.io/valkey-helm/
      targetRevision: 0.9.3
      chart: valkey
      helm:
        valueFiles:
          - $values/romm/values/values-valkey.yaml
    - repoURL: https://git.raft.lutris.house/the_raft/kubernetes.raft
      path: romm
      targetRevision: HEAD
      ref: values
    - repoURL: https://git.raft.lutris.house/api/packages/the_raft/helm/
      chart: gw-helper
      targetRevision: 0.1.1
      helm:
        valueFiles:
          - $values/romm/values/values-gateway.yaml
