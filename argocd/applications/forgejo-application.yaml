---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: forgejo
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: forgejo
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
  ignoreDifferences:
    - kind: Secret
      jsonPointers:
        - /data
  sources:
    - repoURL: oci://code.forgejo.org/forgejo-helm/forgejo
      targetRevision: 17.0.0
      path: .
      helm:
        valuesObject:
          global:
            storageClass: nfs-ssd-csi
          clusterDomain: polycule.raft.lutris.house
          securityContext:
            capabilities:
              add: ["SYS_CHROOT"]
          gitea:
            metrics:
              enabled: true
            config:
              server:
                ROOT_URL: https://git.raft.lutris.house/
                DOMAIN: git.raft.lutris.house
                SSH_DOMAIN: git.raft.lutris.house
                ENABLE_PPROF: true
              database:
                DB_TYPE: postgres
                HOST: "forgejodb-rw:5432"
                USER: forgejo
                NAME: forgejo
              mailer:
                ENABLED: true
                PROTOCOL: smtps
                SMTP_ADDR: smtp.gmail.com
                SMTP_PORT: 465
                USER: alicelutris@gmail.com
                FROM: noreply@git.raft.lutris.house
            additionalConfigFromEnvs:
              - name: FORGEJO__DATABASE__PASSWD
                valueFrom:
                  secretKeyRef:
                    name: forgejo-pg-user
                    key: password
              - name: FORGEJO__MAILER__PASSWD
                valueFrom:
                  secretKeyRef:
                    name: forgejo-smtp-secret
                    key: PASSWD
          persistence:
            size: 400Gi
    - repoURL: https://git.raft.lutris.house/the_raft/kubernetes.raft
      path: forgejo
      targetRevision: HEAD
      ref: values
