---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: immich
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: immich
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
  sources:
    - repoURL: oci://ghcr.io/immich-app/immich-charts/immich
      path: .
      targetRevision: 0.11.1
      helm:
        valueFiles:
          - $values/immich/values/values-immich.yaml
    - repoURL: https://git.raft.lutris.house/the_raft/kubernetes.raft
      path: immich
      targetRevision: HEAD
      ref: values
