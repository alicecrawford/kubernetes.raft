---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
spec:
  project: system
  ignoreDifferences:
    - kind: Secret
      jsonPointers:
        - /data/ca.crt
        - /data/ca.key
        - /data/tls.crt
        - /data/tls.key
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
  sources:
    - repoURL: https://helm.cilium.io/
      targetRevision: 1.19.2
      helm:
        valueFiles:
          - $values/cilium/values/values-cilium.yaml
      chart: cilium
    - repoURL: https://git.raft.lutris.house/the_raft/kubernetes.raft
      path: cilium
      targetRevision: HEAD
      ref: values
