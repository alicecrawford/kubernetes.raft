---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-stack
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
  ignoreDifferences:
    - group: ''
      kind: Secret
      jsonPointers:
        - /data
    - group: '*'
      kind: Deployment
      jsonPointers:
        - /spec/template/metadata/annotations/checksum~1secret
  sources:
    - repoURL: https://github.com/prometheus-community/helm-charts.git
      path: charts/prometheus-node-exporter
      targetRevision: prometheus-node-exporter-4.52.2
      helm:
        valuesObject:
          prometheus:
            podMonitor:
              enabled: true
              relabelings:
                - sourceLabels: [__meta_kubernetes_pod_node_name]
                  targetLabel: instance
                  action: replace
                  replacement: $1
                - targetLabel: job
                  action: replace
                  replacement: node-exporter
    - repoURL: https://github.com/prometheus-community/helm-charts.git
      path: charts/prometheus-smartctl-exporter
      targetRevision: prometheus-smartctl-exporter-0.16.0
      helm:
        valuesObject:
          serviceMonitor:
            enabled: true
            relabelings:
              - sourceLabels: [__meta_kubernetes_pod_node_name]
                targetLabel: instance
                action: replace
                replacement: $1
    - repoURL: https://github.com/prometheus-community/helm-charts.git
      path: charts/kube-prometheus-stack
      targetRevision: kube-prometheus-stack-80.10.0
      helm:
        valuesObject:
          nodeExporter:
            enabled: false

          defaultRules:
            create: false

          prometheusOperator:
            serviceMonitor:
              relabelings:
                - sourceLabels: [__meta_kubernetes_pod_node_name]
                  targetLabel: instance
                  action: replace
                  replacement: $1
            service:
              ipDualStack:
                enabled: true

          prometheus:
            serviceMonitor:
              relabelings:
                - sourceLabels: [__meta_kubernetes_pod_node_name]
                  targetLabel: instance
                  action: replace
                  replacement: $1
            service:
              ipDualStack:
                enabled: true
            prometheusSpec:
              replicas: 2
              replicaExternalLabelName: prometheus_replica
              podAntiAffinity: hard
              additionalScrapeConfigs: |
                - job_name: smartctl-exporter
                  scheme: http
                  static_configs:
                    - targets: ['narwhal.raft.lutris.house:9633']
                - job_name: node-exporter
                  scheme: http
                  static_configs:
                    - targets: ['narwhal.raft.lutris.house:9100']
                - job_name: nut-eaton1500
                  metrics_path: /ups_metrics
                  params:
                    ups: [ 'eaton1500' ]
                  static_configs:
                    - targets: ['narwhal.raft.lutris.house:9199']
                      labels:
                        ups: "eaton1500"
              ruleSelectorNilUsesHelmValues: false
              serviceMonitorSelectorNilUsesHelmValues: false
              podMonitorSelectorNilUsesHelmValues: false
              probeSelectorNilUsesHelmValues: false
              serviceMonitorNamespaceSelector: {}
              podMonitorNamespaceSelector: {}
              retention: 90d
              retentionSize: 95GiB
              externalUrl: https://prometheus.raft.lutris.house
              storageSpec:
                volumeClaimTemplate:
                  spec:
                    storageClassName: longhorn
                    accessModes: ["ReadWriteOnce"]
                    resources:
                      requests:
                        storage: 100Gi

          grafana:
            serviceMonitor:
              relabelings:
                - sourceLabels: [__meta_kubernetes_pod_node_name]
                  targetLabel: instance
                  action: replace
                  replacement: $1
            persistence:
              enabled: true
              storageClassName: longhorn
              accessModes: ["ReadWriteOnce"]
              size: 5Gi
            dashboardProviders:
              dashboardproviders.yaml:
                apiVersion: 1
                providers:
                  - name: default
                    orgId: 1
                    folder: ''
                    type: file
                    disableDeletion: false
                    # Set editable to true
                    editable: true
                    options:
                      path: /var/lib/grafana/dashboards/default

          alertmanager:
            config:
              receivers:
                - name: 'null'
                - name: 'discord-warning'
                  discord_configs:
                    - webhook_url: 'https://discord.com/api/webhooks/1486418967831642294/KdWveFcn3vayM0GxoNuhvo2ZQrQKlmA7q9Gn7wQRnXUpujohttgoCN95Z7DQEuZDekBA'
                      send_resolved: true
                - name: 'discord-critical'
                  discord_configs:
                    - webhook_url: 'https://discord.com/api/webhooks/1486412547400794264/wAUcawXUtbLlpjgGYC0D1ubBNL2qQ6t4WOBwnNs4pb-I1mX8riB2X-76ZSyfJUR-Y8KO'
                      send_resolved: true
              route:
                group_by: ['...']
                receiver: 'discord-warning'
                routes:
                  - receiver: 'null'
                    matchers:
                      - alertname =~ "Watchdog|InfoInhibitor"
                  - receiver: 'discord-critical'
                    matchers:
                      - severity =~ "critical|page"

            serviceMonitor:
              relabelings:
                - sourceLabels: [__meta_kubernetes_pod_node_name]
                  targetLabel: instance
                  action: replace
                  replacement: $1
            service:
              ipDualStack:
                enabled: true
            alertmanagerSpec:
              replicas: 3
              externalUrl: https://alertmanager.raft.lutris.house
              storage:
                volumeClaimTemplate:
                  spec:
                    storageClassName: longhorn
                    accessModes: ["ReadWriteOnce"]
                    resources:
                      requests:
                        storage: 5Gi

          kube-state-metrics:
            replicas: 2
            serviceMonitor:
              relabelings:
                - sourceLabels: [__meta_kubernetes_pod_node_name]
                  targetLabel: instance
                  action: replace
                  replacement: $1

          kubeScheduler:
            serviceMonitor:
              relabelings:
                - sourceLabels: [__meta_kubernetes_pod_node_name]
                  targetLabel: instance
                  action: replace
                  replacement: $1

          kubeEtcd:
            serviceMonitor:
              relabelings:
                - sourceLabels: [__meta_kubernetes_pod_node_name]
                  targetLabel: instance
                  action: replace
                  replacement: $1

          coreDns:
            serviceMonitor:
              relabelings:
                - sourceLabels: [__meta_kubernetes_pod_node_name]
                  targetLabel: instance
                  action: replace
                  replacement: $1

          kubeControllerManager:
            serviceMonitor:
              relabelings:
                - sourceLabels: [__meta_kubernetes_pod_node_name]
                  targetLabel: instance
                  action: replace
                  replacement: $1

          kubelet:
            serviceMonitor:
              relabelings:
                - action: replace
                  sourceLabels: [__metrics_path__]
                  targetLabel: metrics_path
                - sourceLabels: [__meta_kubernetes_endpoint_node_name]
                  targetLabel: instance
                  action: replace
                  replacement: $1

    - repoURL: https://git.raft.lutris.house/the_raft/kubernetes.raft
      path: monitoring
      targetRevision: HEAD
      ref: values
    - repoURL: https://git.raft.lutris.house/the_raft/kubernetes.raft
      path: monitoring/alerts
      targetRevision: HEAD
