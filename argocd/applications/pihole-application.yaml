---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pihole
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: pihole
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
  sources:
    - repoURL: https://mojo2600.github.io/pihole-kubernetes/
      chart: pihole
      path: .
      targetRevision: 2.35.0
      helm:
        valueFiles:
          - $values/pihole/values/values-pihole.yaml
    - repoURL: https://git.raft.lutris.house/the_raft/kubernetes.raft
      path: pihole
      targetRevision: HEAD
      ref: values
