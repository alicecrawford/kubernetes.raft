---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: romm-server
  namespace: romm
spec:
  replicas: 1
  selector:
    matchLabels:
      name: romm
  template:
    metadata:
      labels:
        name: romm
    spec:
      containers:
        - name: romm-server-ctr
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          image: rommapp/romm:4.8.1
          resources:
            requests:
              ephemeral-storage: 2Gi
          volumeMounts:
            - name: romm-data
              mountPath: /romm
            - name: romm-redis
              mountPath: /redis-data
          env:
            - name: SCAN_TIMEOUT
              value: "386400"
            - name: TASK_TIMEOUT
              value: "386400"
            - name: SCAN_WORKERS
              value: "4"
            - name: ROMM_AUTH_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: romm-secret
                  key: romm_auth_secret
            - name: ROMM_BASE_URL
              value: https://romm.raft.lutris.house
            - name: REDIS_PORT
              value: "6379"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: rommdb-app
                  key: host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: rommdb-app
                  key: port
            - name: ROMM_DB_DRIVER
              value: postgresql
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: rommdb-app
                  key: dbname
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: rommdb-app
                  key: username
            - name: DB_PASSWD
              valueFrom:
                secretKeyRef:
                  name: rommdb-app
                  key: password
            - name: OIDC_ENABLED
              value: "true"
            - name: OIDC_PROVIDER
              value: authelia
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: romm-oidc
                  key: romm-id
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: romm-oidc
                  key: romm-secret
            - name: OIDC_REDIRECT_URI
              value: https://romm.raft.lutris.house/api/oauth/openid
            - name: OIDC_SERVER_APPLICATION_URL
              value: https://auth.raft.lutris.house
            - name: IGDB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: romm-secret
                  key: igdb_client_id
            - name: IGDB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: romm-secret
                  key: igdb_client_secret
            - name: SCREENSCRAPER_USER
              valueFrom:
                secretKeyRef:
                  name: romm-secret
                  key: screenscraper_user
            - name: SCREENSCRAPER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: romm-secret
                  key: screenscraper_password
            - name: HASHEOUS_API_ENABLED
              value: "true"
            - name: LAUNCHBOX_API_ENABLED
              value: "true"
            - name: PLAYMATCH_API_ENABLED
              value: "true"
            - name: HLTB_API_ENABLED
              value: "true"
      volumes:
        - name: romm-redis
          emptyDir: {}
        - name: romm-data
          persistentVolumeClaim:
            claimName: romm-data-pvc
