---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: cloudflare-dns01-issuer
  namespace: cert-manager
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: alice@tuxnami.org
    privateKeySecretRef:
      name: cloudflare-issuer-api-key
    solvers:
      - dns01:
          cloudflare:
            email: alice@tuxnami.org
            apiTokenSecretRef:
              name: cloudflare-api-key
              key: api-key
