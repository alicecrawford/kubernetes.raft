---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dashy-cm
  namespace: dashy
data:
  conf.yml: |
    ---
    # Page meta info, like heading, footer text and nav links
    pageInfo:
      title: The Raft Intranet
      description: A world of possibilities!
      navLinks:
        - title: Config
          path: https://git.raft.lutris.house/the_raft/kubernetes.raft/src/branch/main/dashy
        - title: Documentation
          path: https://dashy.to/docs

    # Optional app settings and configuration
    appConfig:
      theme: colorful
      webSearch:
        searchEngine: google

    # Main content - An array of sections, each containing an array of items
    sections:
      - name: Authentication
        icon: fas fa-user-lock
        items:
          - title: Authelia
            description: OIDC Login and password management
            icon: https://www.authelia.com/favicon.ico
            url: https://auth.raft.lutris.house/
            target: newtab
      - name: Development
        icon: mdi-source-repository-multiple
        items:
          - title: Forgejo
            description: Fork this site
            icon: https://forgejo.org/favicon.ico
            url: https://git.raft.lutris.house/
          - title: Livecodes
            description: Livecodes
            url: https://livecodes.raft.lutris.house/
            icon: https://livecodes.io/favicon.ico
          - title: Opengist
            description: Gisty stuff
            icon: https://raw.githubusercontent.com/thomiceli/opengist/master/public/img/opengist.svg
            url: https://gist.raft.lutris.house/
      - name: Media
        icon: mdi-multimedia
        items:
          - title: RomM
            description: Vidja Gaems!
            url: https://romm.raft.lutris.house/
            icon: https://romm.app/favicon.ico
          - title: Immich
            description: Photos!
            url: https://immich.raft.lutris.house/
            icon: https://immich.app/favicon.ico
      - name: Productivity
        icon: mdi-folder-file
        items:
          - title: Cryptpad
            description: Docs n shit
            url: https://cryptpad.raft.lutris.house/
            icon: https://cryptpad.fr/favicon.ico
          - title: Plik
            description: File drop/share
            url: https://plik.raft.lutris.house/
            icon: mdi-file-arrow-up-down
      - name: idk it's the cat's stuff
        icon: fas fa-cat
        items:
          - title: Gwams
            description: Gwams
            url: https://gwams.raft.lutris.house/
            icon: mdi-cookie-alert
      - name: Monitoring
        icon: fas fa-chart-line
        items:
          - title: Grafana
            description: The Raft system monitoring
            url: https://grafana.raft.lutris.house/
            icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/grafana.png
          - title: Prometheus
            description: Prometheus rules and targets
            url: https://prometheus.raft.lutris.house/
            icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/prometheus.png
          - title: Alertmanager
            description: Alertmanager alerts and silences
            url: https://alertmanager.raft.lutris.house/
            icon: fas fa-bell
      - name: System Administration
        icon: mdi-server-network
        items:
          - title: ArgoCD
            description: ArgoCD deployment system
            url: https://argocd.raft.lutris.house/
            icon: https://icon.icepanel.io/Technology/svg/Argo-CD.svg
          - title: LLDAP Frontend
            description: User management
            url: https://ldap.raft.lutris.house/
            icon: mdi-account-cog
          - title: PiHole
            description: PiHole Frontend
            url: https://pihole.raft.lutris.house/
            icon: https://wp-cdn.pi-hole.net/wp-content/uploads/2016/12/Vortex-R.png
